server:
  port: 8081

# CORS origins (comma-separated). Default is safe localhost-only.
# Override at runtime for demo: CORS_ALLOWED_ORIGINS=http://localhost:*,https://your-app.vercel.app
cors:
  allowed-origins: "http://localhost:*,http://127.0.0.1:*,http://[::1]:*,https://pardon-ploy-tasting.ngrok-free.dev"

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/greenplanep2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_0900_ai_ci&sessionVariables=character_set_client=utf8mb4,character_set_connection=utf8mb4,character_set_results=utf8mb4
    username: root
    password: mysql123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false

app:
  seed:
    products-enabled: false
  jwt:
    secret: 0123456789012345678901234567890123456789012345678901234567890123
    access-expiration-minutes: 120
  qwen:
    # DashScope (Tongyi Qianwen) OpenAI-compatible base URL.
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-turbo
    api-key: ${DASHSCOPE_API_KEY:}
